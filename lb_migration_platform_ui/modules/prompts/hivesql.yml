system: |
  Convert Hive SQL to Databricks SQL using LLM.
  Focus on fixing syntax and compatibility issues while preserving original logic. 
  Return the fixed Databricks SQL blocks with their original STATEMENT_ID markers.

rules: |
  - ONLY return valid Databricks SQL blocks with their original STATEMENT_ID markers
  - DO NOT add explanations or comments other than the required STATEMENT_ID markers
  - Preserve each input marker exactly as `-- STATEMENT_ID: <number>` before its corrected SQL
  - Return one corrected SQL block for every input STATEMENT_ID
  - DO NOT add markdown (no ```sql)
  - DO NOT change bussiness logic 
  - ONLY fix statements related to issues
  - Keep output minimal and executable
  - If unsure, return the original SQL without changes
  - DO NOT remove partition logic
  - DO NOT change table behavior
  - PRESERVE structure of other statements exactly
  - FIX only syntax incompatibilities
  - DO NOT skip required transformations


template: |
  Input SQL:
  {code}

  Issues detected:
  {issues}

  You MUST fix the issues if possible.
  Output only SQL blocks with the original STATEMENT_ID markers.
